<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondriaan Project</title>
  <style>
    .grid-container{
      display: grid;
      grid-template-rows:414px 130px 155px 20px;
      grid-template-columns: 320px 198px 153px 50px;
      background-color: #000;
      gap: 9px;
      max-width: 748px;
      max-height: 748px;
    }
    .wit-1{
      background-color:#F0F1EC;
      grid-column:span 3 ;
    }
    .wit-2{
      background-color:#F0F1EC;
      grid-row: span 2;
    }
    .wit-3{
      background-color:#F0F1EC;
      grid-column: span 2;
      grid-row: span 2;
    }   
    .wit-4{
      background-color:#F0F1EC;
      grid-row: span 2;
    }
    .wit-5{
      background-color:#F0F1EC;
    }
    .rood{
      background-color: #E72F24;
    }
    .zwart{
      background-color: #232629;
    }
    .blauw{
      background-color: #004592 ;
      border-bottom: 10px solid #000;
    }
    .geel{
      background-color: #F9D01E ;
    }

/*  
    Schrijf hier je CSS  
    Kleur van de tussenruimte: #000  
    Wit: #F0F1EC  
    Rood: #E72F24  
    Zwart: #232629  
    Blauw: #004592  
    Geel: #F9D01E  

    Voor afmetingen, zie dimensions.png.  
    TIP: Onthoud dat je de eigenschappen van gridlijnen niet kunt wijzigen.  
    Maar gridlijnen zijn transparant!  
*/

  </style>
</head>

<body>
  <!-- Schrijf hier je HTML -->
</body>
<div class="grid-container">
  <div class="rood"></div>
  <div class="wit-1"></div>
  <div class="wit-2"></div>
  <div class="wit-3"></div>
  <div class="blauw"></div>
  <div class="wit-4"></div>
  <div class="wit-5"></div>
  <div class="geel"></div>
  <div class="zwart"></div>

</div>
</html>
